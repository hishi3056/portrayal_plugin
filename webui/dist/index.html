<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>人物档案室</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts-wordcloud@2/dist/echarts-wordcloud.min.js"></script>
<script>(function(){try{var t=localStorage.getItem("portrayal-theme");if(t==="dark"){document.documentElement.classList.add("dark")}}catch(e){}})();</script>
<style>

:root{
  /* ── 文字层级（6 级）── */
  --text-dimmed:#b8b3a8; --text-muted:#9a9588; --text-toned:#6a655e;
  --text:#3a3732; --text-highlighted:#2b2824; --text-inverted:#fffefb;
  /* ── 背景层级（5 级）── */
  --bg:#f5f2ed; --bg-muted:#efebe3; --bg-elevated:#fffefb;
  --bg-accented:rgba(107,91,149,.06); --bg-inverted:#1c1e26;
  /* ── 边框层级（4 级）── */
  --border:#e8e2d9; --border-muted:#eee9e0; --border-accented:#d5cdbf;
  --border-inverted:rgba(255,255,255,.08);
  /* ── 圆角 ── */
  --radius:.375rem; --radius-sm:calc(var(--radius)*.6);
  --radius-md:calc(var(--radius)*1.3); --radius-lg:calc(var(--radius)*2);
  --radius-xl:calc(var(--radius)*2.6); --radius-full:9999px;
  /* ── 语义色 ── */
  --accent:#6b5b95; --accent-d:#544878; --gold:#c4956a;
  --yin:#c45c5c; --ok:#5a8a5a; --warn:#c49e3a; --info:#2c6e8f;
  /* ── 阴影 ── */
  --shadow-sm:0 1px 2px rgba(28,30,38,.04);
  --shadow:0 1px 4px rgba(28,30,38,.06),0 6px 20px rgba(28,30,38,.04);
  --shadow-lg:0 4px 12px rgba(28,30,38,.08),0 12px 40px rgba(28,30,38,.06);
  /* ── z-index ── */
  --z-dropdown:50; --z-sticky:80; --z-overlay:100; --z-modal:200; --z-toast:10050;
  /* ── 侧栏（常暗）── */
  --sidebar-bg:#1c1e26; --sidebar-text:#c8c5bf;
  --sidebar-text-hover:#d5d1c8; --sidebar-text-active:#e8e4dd;
  --sidebar-text-dim:#5a5650; --sidebar-border:rgba(255,255,255,.08);
  --sidebar-hover:rgba(255,255,255,.04); --sidebar-active:rgba(255,255,255,.06);
}
.dark{
  --text-dimmed:#5a4d3e; --text-muted:#6e6050; --text-toned:#8a7560;
  --text:#a38c77; --text-highlighted:#e8e4dd; --text-inverted:#1c1e26;
  --bg:#1c1e26; --bg-muted:#252830; --bg-elevated:#2a2d36;
  --bg-accented:rgba(107,91,149,.12); --bg-inverted:#fffefb;
  --border:rgba(255,255,255,.08); --border-muted:rgba(255,255,255,.05);
  --border-accented:rgba(255,255,255,.12); --border-inverted:#e8e2d9;
  --shadow-sm:0 1px 2px rgba(0,0,0,.2);
  --shadow:0 1px 4px rgba(0,0,0,.15),0 6px 20px rgba(0,0,0,.1);
  --shadow-lg:0 4px 12px rgba(0,0,0,.2),0 12px 40px rgba(0,0,0,.15);
  --sidebar-bg:#161820; --sidebar-border:rgba(255,255,255,.06);
  --sidebar-hover:rgba(255,255,255,.03); --sidebar-active:rgba(255,255,255,.05);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"Noto Sans SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;
  display:flex;height:100vh;overflow:hidden;
}
img{display:block}

/* ═══════════ 左侧导航栏（常暗）═══════════ */
.nav-bar{
  width:56px;min-width:56px;background:var(--sidebar-bg);
  display:flex;flex-direction:column;align-items:center;
  padding:16px 0;gap:4px;z-index:var(--z-overlay);
  transition:width .25s ease;overflow:hidden;
}
.nav-bar:hover{width:160px;align-items:flex-start}
.nav-btn{
  width:40px;height:40px;border:none;background:transparent;
  color:var(--sidebar-text);cursor:pointer;border-radius:var(--radius);
  display:flex;align-items:center;justify-content:center;opacity:.7;
  transition:opacity .18s,background .18s;
  gap:10px;overflow:hidden;white-space:nowrap;flex-shrink:0;
}
.nav-bar:hover .nav-btn{width:100%;justify-content:flex-start;padding:0 16px}
.nav-btn:hover{background:var(--sidebar-hover);opacity:1}
.nav-btn.active{background:var(--sidebar-active);opacity:1;color:var(--sidebar-text-active)}
.nav-btn svg{width:20px;height:20px;flex-shrink:0}
.nav-btn .nb-label{display:none;font-size:13px}
.nav-bar:hover .nb-label{display:inline}
.nav-spacer{flex:1}
.nav-theme-btn{
  width:40px;height:40px;border:none;background:transparent;
  color:var(--sidebar-text);cursor:pointer;border-radius:var(--radius);
  display:flex;align-items:center;justify-content:center;opacity:.6;
  transition:opacity .18s,background .18s;font-size:18px;
  gap:6px;overflow:hidden;white-space:nowrap;flex-shrink:0;
}
.nav-bar:hover .nav-theme-btn{width:100%;justify-content:flex-start;padding:0 16px}
.nav-theme-btn:hover{opacity:1;background:var(--sidebar-hover)}
.nav-theme-btn .nb-label{display:none;font-size:13px}
.nav-bar:hover .nav-theme-btn .nb-label{display:inline}

/* ═══════════ 列表面板 ═══════════ */
.list-panel{
  width:300px;min-width:300px;background:var(--bg-elevated);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  height:100vh;position:relative;z-index:1;
}
.list-header{
  padding:18px 16px 12px;border-bottom:1px solid var(--border);
}
.list-header h2{
  font-family:"Noto Serif SC",serif;font-size:17px;font-weight:700;
  color:var(--text-highlighted);margin-bottom:10px;
}
.list-search{
  width:100%;padding:7px 11px;border:1px solid var(--border);
  border-radius:var(--radius);font-size:13px;outline:none;
  background:var(--bg);color:var(--text);font-family:inherit;
  transition:border .15s;
}
.list-search:focus{border-color:var(--accent)}
.list-body{flex:1;overflow-y:auto;padding:8px 0}
.list-body::-webkit-scrollbar{width:5px}
.list-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── 群分组 ── */
.group-section{margin-bottom:2px}
.group-header{
  display:flex;align-items:center;gap:8px;padding:8px 14px;
  cursor:pointer;user-select:none;transition:background .12s;
  position:sticky;top:0;z-index:10;background:var(--bg-elevated);border-bottom:1px solid var(--border);
}
.group-header:hover{background:var(--bg-muted)}
.group-header .gh-arrow{
  font-size:10px;color:var(--text-muted);transition:transform .2s;
  width:12px;text-align:center;flex-shrink:0;
}
.group-section.collapsed .gh-arrow{transform:rotate(-90deg)}
.group-header .gh-avatar{
  width:28px;height:28px;border-radius:var(--radius-sm);flex-shrink:0;
  background:var(--accent);display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:12px;font-weight:600;
}
.group-header .gh-name{
  font-size:13px;font-weight:600;color:var(--text-highlighted);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;
}
.group-header .gh-count{
  font-size:11px;color:var(--text-muted);background:var(--bg-accented);
  padding:2px 8px;border-radius:var(--radius-full);flex-shrink:0;
}
.group-section.collapsed .group-items{display:none}
.group-items{padding:2px 0 6px}

/* ── 群内搜索 ── */
.group-collect{
  padding:4px 14px 6px;display:flex;gap:6px;align-items:center;
}
.group-collect input{
  flex:1;padding:5px 10px;border:1px solid var(--border);
  border-radius:var(--radius);font-size:12px;background:var(--bg);
  color:var(--text);outline:none;font-family:inherit;
}
.group-collect input:focus{border-color:var(--accent)}
.group-collect button{
  padding:5px 10px;border:1px solid var(--border);background:var(--bg-elevated);
  border-radius:var(--radius);font-size:12px;cursor:pointer;color:var(--text-muted);
  font-family:inherit;white-space:nowrap;transition:all .15s;
}
.group-collect button:hover{border-color:var(--accent);color:var(--accent)}
.group-search-results{position:absolute;top:100%;left:0;right:0;background:var(--bg-elevated);border:1px solid var(--border);border-radius:0 0 var(--radius) var(--radius);box-shadow:var(--shadow-lg);z-index:var(--z-dropdown);max-height:280px;overflow-y:auto;display:none}
.gs-item{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .12s}
.gs-item:hover{background:var(--bg-accented)}
.gs-item:last-child{border-bottom:none}
.gs-item .gsi-info{flex:1;min-width:0}
.gs-item .gsi-name{font-weight:600;font-size:13px}
.gs-item .gsi-meta{font-size:11px;color:var(--text-muted)}
.gs-item .gsi-badge{font-size:10px;padding:2px 6px;border-radius:var(--radius-sm)}
.gs-item .gsi-badge.has{background:rgba(90,138,90,.1);color:var(--ok)}
.gs-item .gsi-badge.new{background:rgba(44,110,143,.1);color:var(--info)}
.gs-item .gsi-nick{color:var(--text-muted);font-size:12px;font-weight:400}
.gs-item .gsi-qq{color:var(--text-muted);font-size:11px;opacity:.7}


/* ── 用户列表项 ── */
.user-item{
  display:flex;align-items:center;gap:10px;padding:8px 14px 8px 44px;
  cursor:pointer;transition:background .12s;user-select:none;
}
.user-item:hover{background:var(--bg-accented)}
.user-item.active{
  background:var(--bg-accented);
  border-left:3px solid var(--accent);padding-left:41px;
}
.user-item .ui-avatar{
  width:32px;height:32px;border-radius:var(--radius-full);flex-shrink:0;
  background:var(--accent);display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:13px;font-weight:600;
}
.user-item .ui-avatar.sq{border-radius:var(--radius-sm)}
.user-item .ui-info{flex:1;min-width:0}
.user-item .ui-name{
  font-size:13px;font-weight:500;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.user-item .ui-sub{
  font-size:11px;color:var(--text-muted);
  font-family:"JetBrains Mono","Consolas",monospace;
}
.user-item .ui-status{
  width:8px;height:8px;border-radius:var(--radius-full);flex-shrink:0;
  background:var(--text-dimmed);
}
.user-item .ui-status.active{background:var(--ok);box-shadow:0 0 6px var(--ok)}
.user-item .ui-status.locked{background:var(--warn)}

/* ═══════════ 右侧详情面板 ═══════════ */
.detail-panel{
  flex:1;overflow-y:auto;display:flex;flex-direction:column;
}
.detail-panel::-webkit-scrollbar{width:6px}
.detail-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── 顶部操作栏 ── */
.detail-header{
  position:sticky;top:0;z-index:var(--z-sticky);
  background:var(--bg-elevated);padding:18px 28px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:16px;
}
.detail-header .dh-avatar{
  width:48px;height:48px;border-radius:var(--radius-full);flex-shrink:0;
  background:var(--accent);display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:18px;font-weight:700;
}
.detail-header .dh-title{flex:1;min-width:200px}
.detail-header .dh-actions{flex-shrink:0;flex-wrap:nowrap}
.detail-header .dh-name{
  font-family:"Noto Serif SC",serif;font-size:20px;font-weight:700;
  color:var(--text-highlighted);
}
.detail-header .dh-sub{
  font-size:12px;color:var(--text-muted);margin-top:2px;
  display:flex;align-items:center;gap:8px;
}
.detail-header .dh-badge{
  padding:2px 8px;border-radius:var(--radius-sm);font-size:11px;font-weight:600;
}
.dh-badge.portrait{background:rgba(107,91,149,.1);color:var(--accent)}
.dh-badge.yin_yang{background:rgba(196,92,92,.1);color:var(--yin)}
.dh-badge.active{background:rgba(90,138,90,.1);color:var(--ok)}
.dh-badge.source{background:rgba(44,110,143,.1);color:var(--info)}
.dh-badge.custom{background:rgba(196,149,106,.1);color:var(--gold)}
.detail-header .dh-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}

/* ── 按钮 ── */
.btn{
  padding:6px 14px;border:1px solid var(--border);background:var(--bg-elevated);
  border-radius:var(--radius);cursor:pointer;font-size:12.5px;font-family:inherit;
  transition:all .15s;color:var(--text);
}
.btn:hover{border-color:var(--accent);background:var(--bg-accented)}
.btn-primary{background:var(--accent);color:var(--text-inverted);border-color:var(--accent)}
.btn-primary:hover{background:var(--accent-d);border-color:var(--accent-d)}
.btn-danger{color:var(--yin);border-color:rgba(196,92,92,.25)}
.btn-danger:hover{background:rgba(196,92,92,.06)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-update{color:var(--info);border-color:rgba(44,110,143,.4);background:rgba(44,110,143,.06);font-weight:600}
.btn-update:hover{background:rgba(44,110,143,.12);border-color:var(--info)}
.btn-yin{color:#c0392b;border-color:rgba(192,57,43,.4);background:rgba(192,57,43,.06);font-weight:600}
.btn-yin:hover{background:rgba(192,57,43,.12);border-color:#c0392b}

/* ── 更多操作 dropdown ── */
.more-menu{position:relative}
.more-dropdown{
  position:absolute;top:100%;right:0;margin-top:6px;
  background:var(--bg-elevated);border:1px solid var(--border);
  border-radius:var(--radius);box-shadow:var(--shadow-lg);
  min-width:160px;padding:6px;z-index:var(--z-dropdown);
  display:none;
}
.more-dropdown.show{display:block}
.more-item{
  display:flex;align-items:center;gap:8px;width:100%;padding:7px 12px;
  border:none;background:transparent;cursor:pointer;font-size:12.5px;
  font-family:inherit;color:var(--text);border-radius:var(--radius-sm);
  transition:background .12s;text-align:left;
}
.more-item:hover{background:var(--bg-accented)}
.more-item.danger{color:var(--yin)}

/* ── 详情内容区 ── */
.detail-body{padding:24px 28px;width:100%}

/* ── 卡片网格 ── */
.card-grid > .card{height:600px;display:flex;flex-direction:column}
.card-grid{display:grid;grid-template-columns:minmax(0,2fr) minmax(0,1fr);gap:16px;margin-bottom:16px}
.card{
  background:var(--bg-elevated);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:20px;transition:all .2s ease;min-width:0
}
.card:hover{box-shadow:var(--shadow-lg)}
.card-title{flex-shrink:0;
  font-size:11px;color:var(--text-muted);text-transform:uppercase;
  letter-spacing:1px;margin-bottom:14px;font-weight:600;
}


/* ── 画像模式切换 ── */
.card-head-row{display:flex;flex-shrink:0;justify-content:space-between;align-items:center;margin-bottom:14px}
.card-head-row .card-title{margin-bottom:0}
.profile-mode-toggle{display:flex;gap:4px;align-items:center}
.pmt-btn{padding:3px 10px;border:1px solid var(--border);background:var(--bg-elevated);border-radius:var(--radius-sm);font-size:11px;cursor:pointer;color:var(--text-muted);font-family:inherit;transition:all .15s}
.pmt-btn.active{background:var(--accent);color:var(--text-inverted);border-color:var(--accent)}
.pmt-btn:hover:not(.active){border-color:var(--accent);color:var(--accent)}
.pmt-edit{padding:3px 8px;border:1px solid var(--border);background:var(--bg-elevated);border-radius:var(--radius-sm);font-size:11px;cursor:pointer;color:var(--text-muted);font-family:inherit;margin-left:4px}
.pmt-edit:hover{border-color:var(--accent);color:var(--accent)}
.pmt-edit.editing{background:var(--accent);color:var(--text-inverted);border-color:var(--accent)}
.profile-content.editing{outline:2px solid var(--accent);background:var(--bg-elevated);cursor:text}
.profile-content:not(.editing){cursor:default}
.profile-content{transition:outline .15s,background .15s}

/* ── 画像内容区 ── */
.profile-content{
  background:var(--bg-muted);border-radius:var(--radius-md);
  padding:16px;font-size:13.5px;line-height:1.8;color:var(--text-toned);
  white-space:pre-wrap;flex:1;overflow-y:auto;min-height:0;
}
.profile-content::-webkit-scrollbar{width:4px}
.profile-content::-webkit-scrollbar-thumb{background:var(--border-accented);border-radius:2px}

/* ── 标签条（置顶紧凑）── */
.tags-bar{
  margin-bottom:16px;background:var(--bg-elevated);
  border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:12px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
.tags-bar .card-title{margin-bottom:0;margin-right:4px;white-space:nowrap}

/* ── 标签 ── */
.tags-container{display:flex;flex-wrap:wrap;gap:8px}
.tag{
  padding:5px 12px;background:var(--bg-accented);border:1px solid var(--border);
  border-radius:var(--radius-full);font-size:12px;color:var(--accent);
}
.tag .tag-x{cursor:pointer;color:var(--text-muted);margin-left:4px;font-weight:bold}
.tag .tag-x:hover{color:var(--yin)}
.tag-add{
  padding:5px 12px;border:1px dashed var(--border-accented);
  border-radius:var(--radius-full);font-size:12px;color:var(--text-muted);
  cursor:pointer;background:transparent;
}
.tag-add:hover{border-color:var(--accent);color:var(--accent)}
.tag-add input{
  border:none;outline:none;background:transparent;font-size:12px;
  color:var(--text);font-family:inherit;width:80px;
}

/* ── 版本时间轴 ── */
.timeline{flex:1;position:relative;padding-left:8px;overflow-y:auto;min-height:0}



.timeline-item{position:relative;padding-left:28px;padding-bottom:32px;cursor:pointer;transition:all .15s;display:flex;flex-wrap:wrap;align-items:center}
.timeline-item .ti-info{flex:1;min-width:0}
.timeline-item .ti-btns{display:flex;gap:4px;flex-shrink:0}
.timeline-item:hover .ti-btns{opacity:1}
.ti-btn{min-width:28px;height:22px;border:1px solid var(--border);background:var(--bg-elevated);border-radius:var(--radius-sm);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);padding:0 6px;white-space:nowrap}
.ti-btn:hover{border-color:var(--accent);color:var(--accent)}
.ti-btn.danger:hover{border-color:var(--yin);color:var(--yin)}
.ti-btn.ti-use{color:var(--accent);border-color:var(--accent)}
.ti-btn.ti-use:hover{background:var(--accent);color:#fff}
.profile-ver-tag{font-size:10px;color:var(--gold);font-weight:600;margin-left:6px;vertical-align:middle}
.timeline-item:last-child{padding-bottom:0}
.timeline-item::before{
  content:'';position:absolute;left:2px;top:6px;
  width:12px;height:12px;border-radius:var(--radius-full);
  background:var(--border-accented);border:2px solid var(--bg-elevated);
  z-index:1;transition:all .15s;
}
.timeline-item.current::before{background:var(--accent);box-shadow:0 0 0 3px rgba(107,91,149,.15)}
.timeline-item.selected::before{background:var(--gold);box-shadow:0 0 0 3px rgba(196,149,106,.2)}
.timeline-item::after{
  content:'';position:absolute;left:7px;top:18px;bottom:-4px;
  width:1px;background:var(--border);transition:opacity .15s;
}
.timeline-item:last-child::after{display:none}
.timeline-item:hover::before{transform:scale(1.2)}
.timeline-item .ti-version{
  font-size:14px;font-weight:600;color:var(--text-muted);
  display:block;margin-bottom:6px;
}
.timeline-item.current .ti-version{color:var(--accent)}
.timeline-item.selected .ti-version{color:var(--gold)}
.timeline-item .ti-mode{
  font-size:11px;padding:2px 8px;border-radius:var(--radius-sm);
}
.ti-mode.portrait{background:rgba(107,91,149,.1);color:var(--accent)}
.ti-mode.yin_yang{background:rgba(196,92,92,.1);color:var(--yin)}
.ti-dot{position:absolute;left:0;top:4px;font-size:12px;color:var(--text-muted);line-height:1}
.timeline-item.current .ti-dot{color:var(--accent)}
.timeline-item.selected .ti-dot{color:var(--gold)}
.ti-mode-line{padding-left:0;margin-top:3px}
.timeline-item .ti-date{font-size:11px;color:var(--text-muted);margin-top:4px;padding-left:0}
.timeline-item .ti-preview{
  font-size:11px;color:var(--text-dimmed);margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-left:0;
}
.timeline-compare{
  margin-top:12px;flex-shrink:0;padding:8px 12px;border:1px solid var(--border);
  border-radius:var(--radius);background:var(--bg-muted);
  font-size:12px;color:var(--text-muted);display:none;align-items:center;gap:8px;
}
.timeline-compare.show{display:flex}
.timeline-compare .tc-clear{cursor:pointer;color:var(--accent);margin-left:auto}
.timeline-compare .tc-clear:hover{text-decoration:underline}

/* ── 版本对比面板 ── */
.compare-panel{
  margin-top:16px;border:1px solid var(--border);border-radius:var(--radius-lg);
  overflow:hidden;display:none;
}
.compare-panel.show{display:block;animation:panel-slide .2s ease}
.compare-head{display:flex;align-items:center;gap:8px;padding:12px 16px;background:var(--bg-accented);border-bottom:1px solid var(--border)}
.compare-head .ch-title{font-size:13px;font-weight:600;color:var(--text-highlighted);white-space:nowrap}
.compare-head .ch-select{padding:3px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;background:var(--bg-elevated);color:var(--text);font-family:inherit;cursor:pointer;outline:none}
.compare-head .ch-select:focus{border-color:var(--accent)}
.compare-head .ch-arrow{color:var(--text-muted);font-size:13px}
.compare-head .ch-close{margin-left:auto;cursor:pointer;color:var(--text-muted);font-size:16px;padding:2px 8px;border-radius:var(--radius-sm);transition:all .12s}
.compare-head .ch-close:hover{color:var(--yin);background:rgba(196,92,92,.06)}
.compare-cols{display:grid;grid-template-columns:1fr 1fr;gap:0}
.compare-col{padding:14px 16px;min-width:0}
.compare-col:first-child{border-right:1px solid var(--border)}
.compare-col-label{font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:8px;padding:3px 8px;border-radius:var(--radius-sm);display:inline-block}
.compare-col-label.left{background:rgba(107,91,149,.1);color:var(--accent)}
.compare-col-label.right{background:rgba(196,149,106,.1);color:var(--gold)}
.compare-col-body{font-size:12.5px;line-height:1.8;white-space:pre-wrap;color:var(--text-toned);max-height:280px;overflow-y:auto}
.compare-col-body::-webkit-scrollbar{width:4px}
.compare-col-body::-webkit-scrollbar-thumb{background:var(--border-accented);border-radius:2px}
.diff-add{background:rgba(90,138,90,.12);color:var(--ok);padding:1px 2px;border-radius:2px}
.diff-del{background:rgba(196,92,92,.12);color:var(--yin);padding:1px 2px;border-radius:2px;text-decoration:line-through;opacity:.8}
.diff-same{color:inherit}

/* ── 话题分析预留区 ── */
.topic-placeholder{

}

/* ── 空状态 ── */
.empty-state{

  color:var(--text-muted);padding:48px;
}
.empty-state .es-icon{font-size:48px;margin-bottom:12px;opacity:.4}
.empty-state .es-text{font-size:14px}

/* ── Toast ── */
#toast-container{position:fixed;top:50%;right:16px;transform:translateY(-50%);z-index:var(--z-toast);display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{
  pointer-events:auto;padding:10px 16px;border-radius:var(--radius);font-size:13px;
  display:flex;align-items:center;gap:8px;max-width:360px;
  animation:toast-in .3s ease;border:1px solid var(--border);box-shadow:var(--shadow-lg);
  background:var(--bg-elevated);
}
.toast.out{animation:toast-out .3s ease forwards}
.toast .t-icon{font-size:16px;flex-shrink:0}
.toast-success{border-left:3px solid var(--ok)} .toast-success .t-icon{color:var(--ok)}
.toast-error{border-left:3px solid var(--yin)} .toast-error .t-icon{color:var(--yin)}
.toast-warn{border-left:3px solid var(--warn)} .toast-warn .t-icon{color:var(--warn)}
.toast-info{border-left:3px solid var(--info)} .toast-info .t-icon{color:var(--info)}

/* ── 动画 ── */
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes page-fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes panel-slide{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
@keyframes card-enter{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes toast-in{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes toast-out{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(40px)}}
@keyframes skeleton-pulse{0%{opacity:.6}50%{opacity:.3}100%{opacity:.6}}

.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:var(--radius-full);animation:sp .7s linear infinite;vertical-align:-3px;margin-right:6px}

/* ── 响应式 ── */

function renderRelationGraph(){

function _doRenderGraph(el,relations,centerName,centerQQ,centerColor,nameMap){
  var nodes=[];
  var links=[];
  var maxW=1;
  for(var uid in relations){if(relations[uid]>maxW)maxW=relations[uid];}
  // 头像URL
  function avatarUrl(qq){return 'image://https://q1.qlogo.cn/g?b=qq&nk='+qq+'&s=100';}
  // 中心节点
  var centerImg=avatarUrl(centerQQ);
  nodes.push({
    id:'center',name:centerName.length>6?centerName.slice(0,6):centerName,
    symbol:centerImg,symbolSize:48,
    itemStyle:{color:centerColor,borderColor:centerColor,borderWidth:2},
    label:{show:true,color:'#fff',fontSize:9,position:'bottom',distance:5},
    value:maxW,_qq:centerQQ,_fullName:centerName
  });
  // 周围节点
  for(var uid in relations){
    var count=relations[uid];
    var size=20+Math.min(count*2,20);
    var info=nameMap[uid]||{name:uid,qq:String(uid)};
    var userName=info.name;
    var img=avatarUrl(info.qq);
    var showLabel=size>=30; // 大节点显示昵称
    var shortLabel=userName.length>6?userName.slice(0,6):userName;
    nodes.push({
      id:uid,name:shortLabel,
      symbol:img,symbolSize:size,
      itemStyle:{color:avatarColor(uid),borderColor:avatarColor(uid),borderWidth:1.5},
      label:{show:showLabel,color:'#9a9588',fontSize:9,position:'bottom',distance:3},
      value:count,_qq:info.qq,_fullName:userName
    });
    links.push({
      source:'center',target:uid,value:count,
      lineStyle:{width:Math.max(1,count/maxW*4),color:'#6b5b95',opacity:0.4},
      _fromName:centerName,_fromQQ:centerQQ,_toName:userName,_toQQ:info.qq
    });
  }
  if(_graphChart){_graphChart.dispose();}
  _graphChart=echarts.init(el);
  _graphChart.setOption({
    tooltip:{show:true,formatter:function(p){
      if(p.dataType==='node'){
        var h='<div style="font-size:12px;max-width:200px">';
        h+='<strong>'+esc(p.data._fullName||p.data.name)+'</strong>';

        if(p.data.value)h+='<br/>互动次数: '+p.data.value;
        h+='</div>';return h;
      }
      if(p.dataType==='edge'){
        var d=p.data;
        var h='<div style="font-size:12px;max-width:220px">';
        h+='<strong>'+esc(d._fromName||'')+'</strong>';
        h+='<span style="color:#888"> ('+esc(d._fromQQ||'')+')</span>';
        h+='<br/>⇄<br/>';
        h+='<strong>'+esc(d._toName||'')+'</strong>';
        h+='<span style="color:#888"> ('+esc(d._toQQ||'')+')</span>';
        if(d.value)h+='<br/>互动次数: '+d.value;
        h+='</div>';return h;
      }
      return '';
    }},
    series:[{type:'graph',layout:'force',roam:true,draggable:true,data:nodes,links:links,
      force:{repulsion:220,edgeLength:[60,160],gravity:0.15,layoutAnimation:true},
      emphasis:{focus:'adjacency',lineStyle:{width:4,color:'#c4956a',opacity:0.8},itemStyle:{shadowBlur:10,shadowColor:'#6b5b95'},label:{color:'#c4956a',fontWeight:700}},
      lineStyle:{color:'#6b5b95',opacity:0.35,curveness:0.1}
    }]
  });
  // 功能占位按钮
  var existingBtn=document.getElementById('graph-fn-btn');
  if(!existingBtn){
    existingBtn=document.createElement('div');
    existingBtn.id='graph-fn-btn';
    existingBtn.style.cssText='position:absolute;top:4px;right:4px;z-index:5;cursor:pointer;padding:3px 10px;border:1px solid var(--border);border-radius:var(--radius-full);font-size:10px;color:var(--text-muted);background:var(--bg-elevated)';
    el.style.position='relative';
    el.appendChild(existingBtn);
  }
  existingBtn.textContent='⚙ 功能';
  existingBtn.onclick=function(){toast('关系图谱功能开发中','info');};
  if(window._graphResizeObs){window._graphResizeObs.disconnect();}
  window._graphResizeObs=new ResizeObserver(function(){if(_graphChart)_graphChart.resize();});
  window._graphResizeObs.observe(el);
}

function renderWordCloud(text,pf){
  var el=document.getElementById('wordcloud-chart');
  if(!el||typeof echarts==='undefined')return;

  // 优先使用真实统计数据
  var words=[];
  var stats=pf.user_stats;
  var meaningfulTags=['n','nr','ns','nt','nz','nw','a','i','l','j'];
  if(stats&&typeof stats==='object'){
    if(_topicMode==='catchphrase'&&stats.catchphrases){
      words=stats.catchphrases.map(function(c){return{name:c.phrase,value:c.count};});
    }else if(stats.top_words){
      words=stats.top_words.filter(function(w){
        if(_topicPosFilter==="all")return true;
        if(_topicPosFilter==="meaningful")return _meaningfulTags.indexOf(w.pos)>=0;
        if(_topicPosFilter==="custom")return _topicCustomTags&&_topicCustomTags.indexOf(w.pos)>=0;
        return true;
      }).map(function(w){return{name:w.word,value:w.count,pos:w.pos};});
    }
  }
  // 回退到画像文本分词
  if(words.length===0){
    if(_topicMode==='catchphrase'&&pf.tags){
      pf.tags.forEach(function(t){words.push({name:t,value:5});});
    }
  }
  // 不再对画像文本做正则分词（会引入 LLM 输出的结构标签如"表达风格""相处建议"）
  if(words.length===0){
    el.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:13px;flex-direction:column;gap:4px"><span>无统计数据</span><span style="font-size:11px">请重新采集画像</span></div>';
    return;
  }

  var fontSizeMap={small:[10,18],medium:[12,24],large:[14,32],xlarge:[18,42]};
  var fs=fontSizeMap[_topicFontSize]||fontSizeMap.medium;
  var total=words.reduce(function(s,w){return s+w.value;},0);

  if(_topicChart){_topicChart.dispose();}
  _topicChart=echarts.init(el);
  // 随机选择词云布局：螺旋散排 vs 网格平铺
  var _wcMode=Math.random()<0.5?'spiral':'grid';
  var _wcShape=_wcMode==='spiral'?'circle':'square';
  // 螺旋：-30~30度自由旋转；网格：0度和90度两种走向，prefer_horizontal 效果
  var _wcRotation=_wcMode==='spiral'?[-30,30]:[0,90];
  var _wcRotationStep=_wcMode==='spiral'?15:90;
  // 网格模式更紧凑：gridSize 小一些，drawOutOfBound 允许超出边界填充
  var _wcGridSize=_wcMode==='spiral'?8:4;
  var _wcDrawOOB=_wcMode==='spiral'?false:true;
  _topicChart.setOption({
    tooltip:{show:true,formatter:function(p){
      var pct=(p.value/total*100).toFixed(1);
      return esc(p.name)+'<br/>出现 '+p.value+' 次<br/>占比 '+pct+'%';
    }},
    series:[{
      type:'wordCloud',
      shape:_wcShape,
      left:'center',top:'center',
      width:'100%',height:'100%',
      sizeRange:fs,
      rotationRange:_wcRotation,
      rotationStep:_wcRotationStep,
      gridSize:_wcGridSize,
      drawOutOfBound:_wcDrawOOB,
      textStyle:{
        fontFamily:'Noto Sans SC, sans-serif',
        fontWeight:'bold',
        color:function(){
          var colors=['#6b5b95','#c4956a','#5a8a5a','#c45c5c','#4a8fa8','#b89cc7','#c49e3a','#6a9e6a'];
          return colors[Math.floor(Math.random()*colors.length)];
        }
      },
      emphasis:{textStyle:{textShadowBlur:10,textShadowColor:'#6b5b95'}},
      data:words
    }]
  });
  // 监听容器宽度变化，自动 resize
  if(window._topicResizeObs){window._topicResizeObs.disconnect();}
  window._topicResizeObs=new ResizeObserver(function(){if(_topicChart)_topicChart.resize();});
  window._topicResizeObs.observe(el);
}

async function loadGA(gid){
  var p=document.createElement("div");p.className="group-analysis-panel show";p.id="ga-"+gid;p.innerHTML='<div class="ga-empty"><span class="spin"></span> 加载中...</div>';
  var sec=document.querySelector('.group-section[data-g="'+esc(gid)+'"] .group-items');if(sec)sec.appendChild(p);
  try{var r=await apiFetch(API+"/api/portrayal/group-analysis/"+encodeURIComponent(gid));var d=await r.json();if(!d.success||!d.data){p.innerHTML='<div class="ga-empty">暂无数据，发送 +群分析 生成</div>';return;}
    var a=d.data;var i;
    var tagsHtml="";if(a.tags&&a.tags.length)for(i=0;i<a.tags.length;i++)tagsHtml+='<span class="gtag default">'+esc(a.tags[i])+"</span>";
    var wcHtml="";if(a.top_words&&a.top_words.length){var maxC=a.top_words[0].count||1;var wcItems=a.top_words.slice(0,12);wcHtml='<div style="display:flex;flex-wrap:wrap;gap:4px 8px;align-items:center;margin-bottom:10px">';for(i=0;i<wcItems.length;i++){var w=wcItems[i];var ratio=w.count/maxC;var fs=11+ratio*12;var op=0.4+ratio*0.6;wcHtml+='<span style="font-size:'+fs+'px;opacity:'+op+';color:var(--text-toned)">'+esc(w.word)+'</span>';}wcHtml+="</div>";}
    var rankHtml="";if(a.hot_topics&&a.hot_topics.length){rankHtml='<div class="rank-list" style="margin-bottom:10px">';for(i=0;i<Math.min(a.hot_topics.length,5);i++){var t=a.hot_topics[i];var pct=Math.min(t.weight||0,100);var cls=i===0?"gold":i===1?"accent":"muted";var medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":(i+1)+".";rankHtml+='<div class="rank-row"><span class="rank-medal">'+medal+'</span><span class="rank-name">'+esc(t.name||"?")+'</span><div class="rank-track"><div class="rank-fill '+cls+'" style="width:'+pct+'%">'+pct+'</div></div></div>';}rankHtml+="</div>";}
    p.innerHTML=(tagsHtml?'<div class="ga-tags">'+tagsHtml+"</div>":"")+wcHtml+rankHtml+(a.summary?'<div style="font-size:12px;color:var(--text-muted);margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">📝 '+esc(a.summary)+"</div>":"")+'<div style="font-size:10px;color:var(--text-muted);margin-top:6px">'+a.message_count+" 条消息 · "+a.user_count+" 人 · v"+a.version+"</div>";
  }catch(e){p.innerHTML='<div class="ga-empty">'+esc(e.message)+"</div>";}
}

// ═══ 日志 ═══
async function loadLogs(){try{var r=await apiFetch(API+"/api/portrayal/logs?page=1&page_size=50");var d=await r.json();var el=document.getElementById("log-content");if(!d.success||!d.data.items.length){el.innerHTML='<div class="empty-state" style="padding:24px"><div class="es-icon">📜</div><div class="es-text">暂无日志</div></div>';return;}var items=d.data.items;var h='<table class="tbl"><thead><tr><th>时间</th><th>目标</th><th>模式</th><th>Token</th><th>耗时</th><th>状态</th></tr></thead><tbody>';for(var i=0;i<items.length;i++){var v=items[i];h+='<tr><td class="mono">'+esc(fmtDate(v.ts))+'</td><td>'+esc(v.target_name||"")+(v.target_user_id?' <span class="mono" style="color:var(--text-muted)">'+esc(v.target_user_id)+'</span>':'')+'</td><td>'+(v.mode==="yin_yang"?'<span class="pill" style="background:rgba(196,92,92,.1);color:var(--yin)">阴阳</span>':'<span class="pill" style="background:rgba(107,91,149,.1);color:var(--accent)">常规</span>')+'</td><td class="mono">'+(v.total_tokens||0)+(v.total_tokens?' <span style="color:var(--text-muted);font-size:10px">('+v.prompt_tokens+'+'+v.completion_tokens+')</span>':'')+'</td><td class="mono">'+(v.duration_ms||0)+'ms</td><td>'+(v.success?'<span class="pill pill-ok">成功</span>':'<span class="pill pill-fail" title="'+esc(v.error||'')+'">失败</span>')+'</td></tr>';}h+='</tbody></table>';el.innerHTML=h;}catch(e){document.getElementById("log-content").innerHTML='<div class="empty-state"><div class="es-text">'+esc(e.message)+"</div></div>";}}

// ═══ 分析 ═══
async function loadAnalytics(){try{var r=await apiFetch(API+"/api/portrayal/analytics");var d=await r.json();var el=document.getElementById("ana-content");if(!d.success){el.innerHTML='<div class="empty-state"><div class="es-text">加载失败</div></div>';return;}var s=d.data,rate=s.total_runs?Math.round(s.success_runs/s.total_runs*100):0;
var h='<div style="display:flex;gap:16px"><div class="toc-nav" id="ana-toc"><a class="toc-item active" onclick="anaScroll(\'overview\')">概览</a>';
if(s.by_group&&s.by_group.length)h+='<a class="toc-item" onclick="anaScroll(\'bygroup\')">按群统计</a>';
if(s.by_mode&&s.by_mode.length)h+='<a class="toc-item" onclick="anaScroll(\'bymode\')">按模式统计</a>';
h+='</div><div style="flex:1;min-width:0">';
h+='<section id="overview"><div class="stats"><div class="stat-card"><div class="num">'+s.total_runs+'</div><div class="label">总生成</div></div><div class="stat-card"><div class="num">'+rate+'%</div><div class="label">成功率</div></div><div class="stat-card"><div class="num">'+(s.total_tokens||0).toLocaleString()+'</div><div class="label">Token</div></div><div class="stat-card"><div class="num">'+(s.avg_duration_ms||0)+'ms</div><div class="label">平均耗时</div></div><div class="stat-card"><div class="num">'+(s.fail_runs||0)+'</div><div class="label">失败</div></div></div></section>';
if(s.by_group&&s.by_group.length){var maxTok=1;s.by_group.forEach(function(r){if(r.tokens>maxTok)maxTok=r.tokens;});h+='<section id="bygroup" style="margin-top:16px"><div class="card"><div class="card-title">按群 Token 消耗</div><div class="rank-list">';s.by_group.forEach(function(r,i){var gn=groupNameMap[r.group];var pct=Math.round(r.tokens/maxTok*100);var cls=i===0?"gold":i===1?"accent":"muted";var medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":(i+1)+".";h+='<div class="rank-row"><span class="rank-medal">'+medal+'</span><span class="rank-name">'+esc(gn||r.group||"未知")+'</span><div class="rank-track"><div class="rank-fill '+cls+'" style="width:'+pct+'%">'+(r.tokens||0).toLocaleString()+'</div></div></div>';});h+='</div></div></section>';}
if(s.by_mode&&s.by_mode.length){h+='<section id="bymode" style="margin-top:16px"><div class="card"><div class="card-title">按模式统计</div><table class="tbl"><thead><tr><th>模式</th><th>次数</th><th>Token</th></tr></thead><tbody>';s.by_mode.forEach(function(r){h+='<tr><td>'+(r.mode==="yin_yang"?"阴阳":"常规")+'</td><td class="mono">'+r.runs+'</td><td class="mono">'+(r.tokens||0).toLocaleString()+'</td></tr>';});h+='</tbody></table></div></section>';}
h+='</div></div>';
el.innerHTML=h;setupAnaSpy();
}catch(e){document.getElementById("ana-content").innerHTML='<div class="empty-state"><div class="es-text">'+esc(e.message)+"</div></div>";}}
function anaScroll(id){var el=document.getElementById(id);if(el)el.scrollIntoView({behavior:"smooth",block:"start"});var items=document.querySelectorAll("#ana-toc .toc-item");for(var i=0;i<items.length;i++)items[i].classList.remove("active");var links={"overview":0,"bygroup":1,"bymode":2};var idx=links[id]||0;if(items[idx])items[idx].classList.add("active");}
function setupAnaSpy(){var dp=document.getElementById("detail-panel");if(!dp)return;var sections=dp.querySelectorAll("section[id]");if(!sections.length)return;var obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){var id=e.target.id;var items=document.querySelectorAll("#ana-toc .toc-item");for(var i=0;i<items.length;i++)items[i].classList.remove("active");var links={"overview":0,"bygroup":1,"bymode":2};var idx=links[id]||0;if(items[idx])items[idx].classList.add("active");}});},{root:dp,threshold:0.3});sections.forEach(function(s){obs.observe(s);});}

// ═══ Prompt ═══
async function loadPrompts(){try{var r=await apiFetch(API+"/api/portrayal/prompts");var d=await r.json();var el=document.getElementById("prompt-content");if(!d.success){el.innerHTML='<div class="empty-state"><div class="es-text">加载失败</div></div>';return;}var prompts=d.data||{},names=Object.keys(prompts).sort(),h="";for(var i=0;i<names.length;i++){var n=names[i],pre=(prompts[n]||"").substring(0,80);h+='<div class="card" style="margin-bottom:6px;cursor:pointer" onclick="editPrompt(\''+jsEsc(n)+'\')"><div style="display:flex;justify-content:space-between;align-items:center"><strong>'+esc(n)+'</strong><span style="font-size:11px;color:var(--accent)">点击编辑</span></div><span style="font-size:12px;color:var(--text-muted)">'+esc(pre)+"...</span></div>";}el.innerHTML=h||'<div class="empty-state"><div class="es-text">无 Prompt</div></div>';}catch(e){document.getElementById("prompt-content").innerHTML='<div class="empty-state"><div class="es-text">'+esc(e.message)+"</div></div>";}}
var _currPrompt='';
function editPrompt(name){_currPrompt=name;apiFetch(API+'/api/portrayal/prompts/'+encodeURIComponent(name)).then(function(r){return r.json();}).then(function(d){if(!d.success){toast('加载失败','error');return;}var el=document.getElementById('prompt-content');el.innerHTML='<div class="card"><div class="card-title">编辑: '+esc(name)+'</div><textarea id="prompt-editor-text" style="width:100%;min-height:300px;padding:12px;border:1px solid var(--border);border-radius:var(--radius-md);font-family:JetBrains Mono,Consolas,monospace;font-size:12.5px;resize:vertical;line-height:1.65;outline:none;background:var(--bg-muted);color:var(--text)">'+esc(d.data.content||'')+'</textarea><div style="margin-top:8px;display:flex;gap:8px"><button class="btn btn-primary btn-sm" onclick="savePrompt()">保存</button><button class="btn btn-sm" onclick="loadPrompts()">返回列表</button></div></div>';});}
function savePrompt(){var txt=document.getElementById('prompt-editor-text');if(!txt||!_currPrompt)return;apiFetch(API+'/api/portrayal/prompts/'+encodeURIComponent(_currPrompt),{method:'PUT',body:JSON.stringify({content:txt.value})}).then(function(r){return r.json();}).then(function(d){if(d.success){toast('保存成功','success');loadPrompts();}else toast('保存失败','error');}).catch(function(e){toast(e.message,'error');});}

// ═══ 回收站 ═══
async function loadRecycle(){try{var r=await apiFetch(API+"/api/portrayal/recycle?page=1&page_size=100");var d=await r.json();var el=document.getElementById("recycle-content");if(!d.success||!d.data.items.length){el.innerHTML="<div class=empty-state><div class=es-text>回收站为空</div></div>";return;}var items=d.data.items,h="";for(var i=0;i<items.length;i++){var p=items[i];h+='<div class="card" style="margin-bottom:6px"><div style="display:flex;justify-content:space-between;align-items:center"><div><strong>'+esc(p.person_name||"")+'</strong> <span class="ver" style="font-size:10px">v'+p.version+'</span> <span style="font-size:12px;color:var(--text-muted)">'+esc(fmtDate(p.deleted_at))+"</span></div><div style='display:flex;gap:6px'><button class='btn btn-sm btn-primary' onclick=rstP("+p.id+")>恢复</button><button class='btn btn-sm btn-danger' onclick=prgP("+p.id+")>彻底删除</button></div></div><div style='font-size:12px;color:var(--text-muted);margin-top:4px'>"+esc((p.display_text||"").slice(0,100))+"</div></div>";}el.innerHTML=h;}catch(e){document.getElementById("recycle-content").innerHTML="<div class=empty-state><div class=es-text>"+esc(e.message)+"</div></div>";}}
async function rstP(id){try{var r=await apiFetch(API+"/api/portrayal/recycle/"+id+"/restore",{method:"POST"});if((await r.json()).success){toast("已恢复","success");loadRecycle();loadProfiles();}else toast("失败","error");}catch(e){toast(e.message,"error");}}
async function prgP(id){if(!confirm("彻底删除？不可恢复"))return;try{var r=await apiFetch(API+"/api/portrayal/recycle/"+id,{method:"DELETE"});if((await r.json()).success){toast("已删除","success");loadRecycle();}else toast("失败","error");}catch(e){toast(e.message,"error");}}

// ═══ 配置 ═══
async function loadConfig(){try{var rs=await Promise.all([apiFetch(API+"/api/portrayal/config").then(function(r){return r.json();}),apiFetch(API+"/api/portrayal/stats").then(function(r){return r.json();})]);var cfg=rs[0],sts=rs[1],el=document.getElementById("config-content"),h="";if(cfg.success){var e=Object.entries(cfg.data);h+="<table class=tbl><thead><tr><th>配置项</th><th>值</th></tr></thead><tbody>";for(var i=0;i<e.length;i++)h+="<tr><td>"+esc(e[i][0])+"</td><td class=mono>"+esc(String(e[i][1]))+"</td></tr>";h+="</tbody></table>";}if(sts.success){var s=sts.data;h="<div class=stats><div class=stat-card><div class=num>"+s.total_active+"</div><div class=label>激活画像</div></div><div class=stat-card><div class=num>"+(s.locked||0)+"</div><div class=label>锁定</div></div><div class=stat-card><div class=num>"+(s.group_count||0)+"</div><div class=label>群组</div></div></div>"+h;}el.innerHTML=h||"<div class=empty-state><div class=es-text>暂无数据</div></div>";}catch(e){document.getElementById("config-content").innerHTML="<div class=empty-state><div class=es-text>"+esc(e.message)+"</div></div>";}}

// ═══ 启动 ═══
loadProfiles();

</script>
